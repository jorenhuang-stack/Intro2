<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="將會議逐字稿整理成清楚、可行動的摘要。">
  <title>會議摘要器</title>
  <style>
    :root{color-scheme:dark;--bg:#09111f;--card:#101b2e;--line:#26344b;--text:#eef4ff;--muted:#9cacc5;--accent:#68e0c1;--accent2:#78a8ff;--danger:#ff8b8b}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 0,#172a48 0,transparent 38%),var(--bg);color:var(--text);font-family:Inter,"Noto Sans TC",system-ui,sans-serif}
    main{width:min(1080px,calc(100% - 32px));margin:auto;padding:64px 0}header{margin-bottom:28px}h1{font-size:clamp(2rem,5vw,3.6rem);line-height:1;margin:0 0 12px;letter-spacing:-.04em}header p{margin:0;color:var(--muted);font-size:1.05rem}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.card{background:color-mix(in srgb,var(--card) 92%,transparent);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 20px 60px #0004}
    label{display:block;font-weight:700;margin-bottom:10px}textarea{width:100%;min-height:390px;resize:vertical;background:#091321;border:1px solid var(--line);border-radius:14px;padding:16px;color:var(--text);font:inherit;line-height:1.65}textarea:focus{outline:2px solid var(--accent2);border-color:transparent}
    .actions{display:flex;align-items:center;gap:12px;margin-top:14px}button{border:0;border-radius:999px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#07111f;font-weight:800;padding:12px 20px;cursor:pointer}button:disabled{opacity:.5;cursor:wait}.count,.hint{color:var(--muted);font-size:.85rem;margin-left:auto}.result{min-height:390px;white-space:pre-wrap;line-height:1.72}.empty{color:var(--muted)}.error{color:var(--danger)}footer{margin-top:18px;color:var(--muted);font-size:.8rem;text-align:center}
    @media(max-width:780px){main{padding:36px 0}.grid{grid-template-columns:1fr}textarea,.result{min-height:300px}}
  </style>
</head>
<body>
<main>
  <header><h1>把會議，變成下一步。</h1><p>貼上逐字稿，快速整理重點、決議、待辦與風險。</p></header>
  <section class="grid">
    <article class="card">
      <label for="transcript">會議逐字稿</label>
      <textarea id="transcript" maxlength="50000" placeholder="在這裡貼上會議內容……"></textarea>
      <div class="actions"><button id="summarize">產生摘要</button><span class="count"><span id="count">0</span> / 50,000</span></div>
    </article>
    <article class="card">
      <label>摘要結果</label>
      <div id="result" class="result empty" aria-live="polite">摘要會出現在這裡。</div>
      <div class="actions"><button id="copy" hidden>複製摘要</button><span class="hint">內容由 AI 產生，重要決議請人工確認。</span></div>
    </article>
  </section>
  <footer>不在瀏覽器保存逐字稿；API Key 僅存於 Google Apps Script。</footer>
</main>
<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbzH8JZpgrh-Hy-6M6PZcc9lmQSa-zEaocRFg8iLwYI2f8z1gqDmvR0VWH1oekw6bk06DQ/exec';
  const input=document.querySelector('#transcript'),result=document.querySelector('#result'),button=document.querySelector('#summarize'),copy=document.querySelector('#copy'),count=document.querySelector('#count');
  input.addEventListener('input',()=>count.textContent=input.value.length.toLocaleString());
  button.addEventListener('click',async()=>{
    const transcript=input.value.trim();
    if(!transcript){result.className='result error';result.textContent='請先貼上會議逐字稿。';return}
    button.disabled=true;button.textContent='整理中…';copy.hidden=true;result.className='result empty';result.textContent='正在抓出關鍵決議與待辦事項…';
    try{
      const response=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({transcript})});
      const data=await response.json();if(!response.ok||!data.ok)throw new Error(data.error||'服務暫時無法使用');
      result.className='result';result.textContent=data.summary;copy.hidden=false;
    }catch(error){result.className='result error';result.textContent=`產生失敗：${error.message}`}
    finally{button.disabled=false;button.textContent='產生摘要'}
  });
  copy.addEventListener('click',async()=>{await navigator.clipboard.writeText(result.textContent);copy.textContent='已複製';setTimeout(()=>copy.textContent='複製摘要',1500)});
</script>
</body>
</html>
